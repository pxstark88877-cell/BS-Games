<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Games - Batool Store Games</title>
<style>
  :root{
    --bg:#0b0e1a;
    --panel:#12172b;
    --orange:#ff7a1a;
    --amber:#ffc93c;
    --text:#f5f7ff;
    --muted:#8892b0;
    --cabinet:#1c2340;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(ellipse at top, #171f3d 0%, var(--bg) 55%), var(--bg);
    color:var(--text);
    font-family:'Tahoma', 'Segoe UI', sans-serif;
    text-align:center;
    padding-bottom:60px;
  }
  header{
    padding:40px 20px 20px;
  }
  h1{
    font-size:clamp(28px, 6vw, 54px);
    color:var(--orange);
    text-shadow:0 0 20px rgba(255,122,26,0.5);
    margin:0 0 8px;
    letter-spacing:1px;
  }
  p.sub{
    color:var(--muted);
    font-size:16px;
    letter-spacing:2px;
    margin:0;
    text-transform:uppercase;
  }
  .gallery{
    max-width:1000px;
    margin:30px auto 0;
    padding:0 16px;
    display:flex;
    flex-direction:column;
    gap:28px;
  }
  .gallery img{
    width:100%;
    height:auto;
    border-radius:14px;
    border:1px solid var(--cabinet);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    display:block;
  }
  footer{
    margin-top:40px;
    color:var(--muted);
    font-size:13px;
    letter-spacing:1px;
  }
</style>
</head>
<body>

<header>
  <h1>BS GAMES</h1>
</header>

<div class="gallery">
  <img src="Batool_Store_Games_Part_01.png" alt="Part 1" loading="lazy">
  <img src="Batool_Store_Games_Part_02.png" alt="Part 2" loading="lazy">
  <img src="Batool_Store_Games_Part_03.png" alt="Part 3" loading="lazy">
  <img src="Batool_Store_Games_Part_04.png" alt="Part 4" loading="lazy">
  <img src="Batool_Store_Games_Part_05.png" alt="Part 5" loading="lazy">
  <img src="Batool_Store_Games_Part_06.png" alt="Part 6" loading="lazy">
  <img src="Batool_Store_Games_Part_07.png" alt="Part 7" loading="lazy">
  <img src="Batool_Store_Games_Part_08.png" alt="Part 8" loading="lazy">
  <img src="Batool_Store_Games_Part_09.png" alt="Part 9" loading="lazy">
  <img src="Batool_Store_Games_Part_10.png" alt="Part 10" loading="lazy">
</div>

<footer>BS GAMES &mdash; ARCADE SELECTION SCREEN</footer>

</body>
</html>
