<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Games - Batool Store Games</title>
<style>
  :root{
    --bg:#0b0e1a;
    --panel:#12172b;
    --orange:#ff7a1a;
    --amber:#ffc93c;
    --text:#f5f7ff;
    --muted:#8892b0;
    --cabinet:#1c2340;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(ellipse at top, #171f3d 0%, var(--bg) 55%), var(--bg);
    color:var(--text);
    font-family:'Tahoma', 'Segoe UI', sans-serif;
    text-align:center;
    padding-bottom:60px;
  }
  .gallery{
    max-width:1000px;
    margin:30px auto 0;
    padding:0 16px;
    display:flex;
    flex-direction:column;
    gap:28px;
  }
  .gallery img{
    width:100%;
    height:auto;
    border-radius:14px;
    border:1px solid var(--cabinet);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    display:block;
    background:var(--panel);
  }
</style>
</head>
