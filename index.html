<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Games - Game Menu</title>
<style>
  :root {
    --bg-dark: #0f1322;
    --card-bg: #161c32;
    --orange-brand: #ff7a1a;
    --yellow-badge: #ffc93c;
    --text-white: #ffffff;
    --text-muted: #8892b0;
    --border-color: #242c4b;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background-color: var(--bg-dark);
    color: var(--text-white);
    padding: 20px;
    direction: rtl;
  }

  /* تصميم الهيدر العلوي المتطابق مع الصورة */
  header {
    text-align: center;
    margin-bottom: 30px;
    border-bottom: 2px dashed #242c4b;
    padding-bottom: 20px;
    position: relative;
  }

  header h1 {
    font-size: 3rem;
    color: var(--orange-brand);
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  header .subtitle {
    font-size: 1.1rem;
    color: var(--text-muted);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* شبكة عرض كروت الألعاب */
  .games-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 10px;
  }

  /* تصميم كارت اللعبة المطابق للصورة */
  .game-card {
    background-color: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 15px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    transition: all 0.3s ease;
  }

  .game-card:hover {
    transform: translateY(-5px);
    border-color: var(--orange-brand);
    box-shadow: 0 12px 25px rgba(255, 122, 26, 0.15);
  }

  /* غلاف اللعبة */
  .game-thumbnail {
    width: 100%;
    height: 200px;
    overflow: hidden;
    border-bottom: 2px solid var(--border-color);
  }

  .game-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .game-card:hover .game-thumbnail img {
    transform: scale(1.05);
  }

  /* تفاصيل اللعبة (الاسم والمساحة) */
  .game-info {
    text-align: center;
    padding: 15px 10px 5px 10px;
    width: 100%;
  }

  .game-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--text-white);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* بادج الحجم المتطابق باللون الأصفر والكتابة السوداء */
  .game-size {
    display: inline-block;
    background-color: var(--yellow-badge);
    color: #000000;
    font-weight: bold;
    font-size: 0.85rem;
    padding: 4px 20px;
    border-radius: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<header>
  <h1>BS GAMES</h1>
  <div class="subtitle">GAME MENU • PART 2 OF 10</div>
</header>

<div class="games-grid">
  <!-- اللعبة الأولى -->
  <div class="game-card">
    <div class="game-thumbnail">
      <img src="ac_rogue.jpg" alt="AC: Rogue">
    </div>
    <div class="game-info">
      <div class="game-title">AC: Rogue</div>
      <span class="game-size">11.3 GB</span>
    </div>
  </div>

  <!-- اللعبة الثانية -->
  <div class="game-card">
    <div class="game-thumbnail">
      <img src="ac_syndicate.jpg" alt="AC: Syndicate">
    </div>
    <div class="game-info">
      <div class="game-title">AC: Syndicate</div>
      <span class="game-size">67.3 GB</span>
    </div>
  </div>

  <!-- اللعبة الثالثة -->
  <div class="game-card">
    <div class="game-thumbnail">
      <img src="ac_valhalla.jpg" alt="AC: Valhalla">
    </div>
    <div class="game-info">
      <div class="game-title">AC: Valhalla</div>
      <span class="game-size">94 GB</span>
    </div>
  </div>

  <!-- اللعبة الرابعة -->
  <div class="game-card">
    <div class="game-thumbnail">
      <img src="battlefield_1.jpg" alt="Battlefield 1">
    </div>
    <div class="game-info">
      <div class="game-title">Battlefield 1</div>
      <span class="game-size">33 GB</span>
    </div>
  </div>
</div>

</body>
</html>
