<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batool Store Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:#1c120e;
    --shelf:#2f1d15;
    --shelf-edge:#43291b;
    --shelf-shadow:rgba(0,0,0,.55);
    --tag:#f2e8cf;
    --tag-edge:#d9c8a0;
    --ink:#241610;
    --mustard:#dd9a2b;
    --mustard-dark:#b87a1a;
    --teal:#2f8f7f;
    --stamp-red:#b5453b;
    --muted:#8a7862;
    --paper-crease:rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at 50% -10%, #3a241a 0%, var(--wall) 60%),
      var(--wall);
    color:var(--tag);
    font-family:'Inter', 'Tahoma', sans-serif;
    padding-bottom:80px;
  }

  /* ===== HEADER / MARQUEE ===== */
  header{
    position:relative;
    padding:48px 20px 34px;
    text-align:center;
    background:
      linear-gradient(180deg, #241511 0%, var(--wall) 100%);
    border-bottom:6px solid var(--shelf-edge);
    box-shadow:0 10px 30px var(--shelf-shadow);
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,.02) 0 2px, transparent 2px 40px);
    pointer-events:none;
  }
  .marquee{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(48px, 11vw, 96px);
    letter-spacing:6px;
    color:var(--mustard);
    text-shadow:
      0 0 12px rgba(221,154,43,.55),
      0 3px 0 #7a4f14,
      0 6px 14px rgba(0,0,0,.6);
    margin:0;
    line-height:1;
  }
  .marquee span{color:var(--tag);}
  .subtitle{
    font-family:'Special Elite', monospace;
    color:var(--muted);
    letter-spacing:3px;
    font-size:13px;
    margin-top:10px;
    text-transform:uppercase;
  }
  .count-badge{
    display:inline-block;
    margin-top:16px;
    padding:6px 18px;
    border:1.5px dashed var(--mustard-dark);
    border-radius:3px;
    font-family:'Special Elite', monospace;
    font-size:12px;
    color:var(--mustard);
    letter-spacing:1px;
  }

  /* ===== CONTROLS ===== */
  .controls{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, var(--shelf) 0%, #26170f 100%);
    border-bottom:3px solid var(--shelf-edge);
    padding:14px 16px;
    display:flex; flex-direction:column; gap:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
  }
  .search-row{
    display:flex; gap:10px; max-width:640px; margin:0 auto; width:100%;
  }
  .search-row input{
    flex:1;
    background:var(--tag);
    border:none;
    border-radius:4px;
    padding:12px 16px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--ink);
    box-shadow:inset 0 2px 5px rgba(0,0,0,.25);
  }
  .search-row input::placeholder{color:#8a7c5f;}
  .search-row input:focus{outline:3px solid var(--mustard); outline-offset:1px;}

  .genre-row{
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    max-width:900px; margin:0 auto; width:100%;
  }
  .chip{
    font-family:'Special Elite', monospace;
    font-size:12px;
    padding:7px 14px;
    border-radius:20px;
    border:1.5px solid var(--tag-edge);
    background:transparent;
    color:var(--tag);
    cursor:pointer;
    letter-spacing:.5px;
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }
  .chip:hover{transform:translateY(-2px);}
  .chip:focus-visible{outline:2px solid var(--mustard); outline-offset:2px;}
  .chip.active{
    background:var(--mustard);
    color:var(--ink);
    border-color:var(--mustard);
  }

  /* ===== A-Z NAV ===== */
  .az-nav{
    position:sticky; top:96px; z-index:20;
    display:flex; overflow-x:auto; gap:2px;
    padding:8px 12px;
    background:var(--wall);
    border-bottom:1px solid var(--shelf-edge);
    scrollbar-width:none;
  }
  .az-nav::-webkit-scrollbar{display:none;}
  .az-nav a{
    flex:0 0 auto;
    font-family:'Bebas Neue', sans-serif;
    font-size:16px;
    color:var(--muted);
    text-decoration:none;
    padding:4px 9px;
    border-radius:3px;
    letter-spacing:1px;
  }
  .az-nav a.has-games{color:var(--tag);}
  .az-nav a.has-games:hover{background:var(--shelf-edge); color:var(--mustard);}

  /* ===== SECTIONS ===== */
  .catalog{max-width:1200px; margin:0 auto; padding:0 16px;}
  .letter-section{margin-top:34px;}
  .letter-tab{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:'Bebas Neue', sans-serif;
    font-size:34px;
    color:var(--wall);
    background:var(--mustard);
    padding:4px 22px 6px 16px;
    border-radius:4px 12px 12px 4px;
    box-shadow:4px 4px 0 var(--mustard-dark), 4px 4px 14px rgba(0,0,0,.4);
    margin-bottom:16px;
    letter-spacing:2px;
  }
  .letter-tab small{
    font-family:'Special Elite', monospace;
    font-size:11px;
    color:var(--wall);
    opacity:.75;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:22px 16px;
  }

  /* ===== CARD (price tag) ===== */
  .card{
    position:relative;
    background:var(--tag);
    border-radius:6px;
    padding:10px 10px 12px;
    box-shadow:0 8px 0 rgba(0,0,0,.18), 0 14px 24px rgba(0,0,0,.45);
    cursor:default;
    transition:transform .22s cubic-bezier(.2,.8,.3,1.2), box-shadow .22s ease;
    transform-origin:top center;
  }
  .card:hover, .card:focus-within{
    transform:translateY(-6px) rotate(-1.2deg) scale(1.03);
    box-shadow:0 14px 0 rgba(0,0,0,.16), 0 26px 34px rgba(0,0,0,.55);
    z-index:5;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-7px; left:50%; transform:translateX(-50%);
    width:14px; height:14px;
    background:var(--wall);
    border-radius:50%;
    box-shadow:0 0 0 3px var(--tag-edge);
  }
  .poster-wrap{
    width:100%;
    aspect-ratio:3/4;
    border-radius:4px;
    overflow:hidden;
    background:#00000022;
    box-shadow:inset 0 0 0 1px var(--paper-crease);
  }
  .poster-wrap img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .card-title{
    font-family:'Special Elite', monospace;
    font-size:12.5px;
    line-height:1.35;
    color:var(--ink);
    margin-top:9px;
    text-align:center;
    min-height:34px;
  }
  .genre-stamp{
    position:absolute;
    top:8px; left:8px;
    font-family:'Special Elite', monospace;
    font-size:9px;
    letter-spacing:.5px;
    padding:2px 7px;
    border:1.5px solid currentColor;
    border-radius:3px;
    transform:rotate(-8deg);
    text-transform:uppercase;
    background:rgba(242,232,207,.85);
    backdrop-filter:blur(1px);
  }
  .genre-Shooter{color:var(--stamp-red);}
  .genre-RPG{color:#6a4fae;}
  .genre-Racing{color:var(--teal);}
  .genre-Sports{color:#2f6f9f;}
  .genre-Fighting{color:#a8442e;}
  .genre-Horror{color:#3c2b1f;}
  .genre-Strategy{color:#3f7a3f;}
  .genre-Multiplayer{color:var(--mustard-dark);}
  .genre-Adventure{color:#8a5a1f;}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
    font-family:'Special Elite', monospace;
    display:none;
  }

  footer{
    text-align:center;
    margin-top:60px;
    padding:24px;
    font-family:'Special Elite', monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
  }

  @media (max-width:480px){
    .marquee{letter-spacing:3px;}
    .grid{grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:16px 10px;}
    .az-nav{top:110px;}
  }

  @media (prefers-reduced-motion: reduce){
    .card, .chip{transition:none;}
  }
</style>
</head>

const catalogEl = document.getElementById('catalog');
const azNavEl = document.getElementById('azNav');
const genreRowEl = document.getElementById('genreRow');
const searchInput = document.getElementById('searchInput');
const emptyState = document.getElementById('emptyState');
const countBadge = document.getElementById('countBadge');

function sortKey(title){
  return title.replace(/^(the|a|an)\s+/i, '').toLowerCase();
}
function letterOf(title){
  const k = sortKey(title);
  const c = k.charAt(0).toUpperCase();
  return /[A-Z]/.test(c) ? c : '#';
}

GAMES.sort((a,b) => sortKey(a.title).localeCompare(sortKey(b.title)));

const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const genres = [...new Set(GAMES.map(g => g.genre))].sort();

// Build genre chips
let activeGenre = 'ALL';
function renderChips(){
  genreRowEl.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeGenre==='ALL' ? ' active':'');
  allChip.textContent = 'الكل';
  allChip.onclick = () => { activeGenre='ALL'; renderChips(); render(); };
  genreRowEl.appendChild(allChip);
  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (activeGenre===g ? ' active':'');
    btn.textContent = g;
    btn.onclick = () => { activeGenre = g; renderChips(); render(); };
    genreRowEl.appendChild(btn);
  });
}
renderChips();

// Build A-Z nav
function renderAzNav(availableLetters){
  azNavEl.innerHTML = '';
  letters.forEach(L => {
    const a = document.createElement('a');
    a.textContent = L;
    a.href = '#letter-' + L;
    if(availableLetters.has(L)) a.classList.add('has-games');
    else a.setAttribute('aria-disabled','true');
    azNavEl.appendChild(a);
  });
}

function render(){
  const q = searchInput.value.trim().toLowerCase();
  const filtered = GAMES.filter(g => {
    const matchesSearch = !q || g.title.toLowerCase().includes(q);
    const matchesGenre = activeGenre==='ALL' || g.genre===activeGenre;
    return matchesSearch && matchesGenre;
  });

  countBadge.textContent = filtered.length + ' عنوان' + (q||activeGenre!=='ALL' ? ' مطابق' : ' · مرتبين أبجدياً');

  catalogEl.innerHTML = '';
  emptyState.style.display = filtered.length ? 'none' : 'block';

  const groups = {};
  filtered.forEach(g => {
    const L = letterOf(g.title);
    (groups[L] = groups[L] || []).push(g);
  });

  renderAzNav(new Set(Object.keys(groups)));

  const orderedLetters = letters.filter(L => groups[L]);
  if(groups['#']) orderedLetters.push('#');

  orderedLetters.forEach(L => {
    const section = document.createElement('section');
    section.className = 'letter-section';
    section.id = 'letter-' + L;

    const tab = document.createElement('div');
    tab.className = 'letter-tab';
    tab.innerHTML = L + ' <small>' + groups[L].length + '</small>';
    section.appendChild(tab);

    const grid = document.createElement('div');
    grid.className = 'grid';

    groups[L].forEach(g => {
      const card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;

      const stamp = document.createElement('span');
      stamp.className = 'genre-stamp genre-' + g.genre;
      stamp.textContent = g.genre;

      const posterWrap = document.createElement('div');
      posterWrap.className = 'poster-wrap';
      const img = document.createElement('img');
      img.src = 'games/' + encodeURIComponent(g.file);
      img.alt = g.title;
      img.loading = 'lazy';
      posterWrap.appendChild(img);

      const titleEl = document.createElement('div');
      titleEl.className = 'card-title';
      titleEl.textContent = g.title;

      card.appendChild(stamp);
      card.appendChild(posterWrap);
      card.appendChild(titleEl);
      grid.appendChild(card);
    });

    section.appendChild(grid);
    catalogEl.appendChild(section);
  });
}

searchInput.addEventListener('input', () => render());
render();
</script>
